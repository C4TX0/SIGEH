<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIGEH - Frontend</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="auth-guard" class="hidden"></div>
    <div id="login-root"></div>

    <section id="app-shell" class="hidden">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-badge">SIGEH</span>
          <div>
            <div class="brand-title">Panel</div>
            <div id="user-role" class="muted"></div>
          </div>
        </div>
        <nav id="menu"></nav>
        <button id="logout" class="ghost">Cerrar sesion</button>
      </aside>

      <main class="content">
        <header class="topbar">
          <h2 id="view-title">Dashboard</h2>
          <div id="user-info" class="muted"></div>
        </header>
        <div id="views-root"></div>
      </main>
    </section>
  </div>

  <script src="./pages/login.js"></script>
  <script src="./pages/dashboard.js"></script>
  <script src="./pages/pacientes.js"></script>
  <script src="./pages/medicos.js"></script>
  <script src="./pages/consultas.js"></script>
  <script src="./pages/agenda-medico.js"></script>
  <script src="./pages/atencion.js"></script>
  <script src="./pages/hospitalizaciones.js"></script>
  <script src="./pages/expediente.js"></script>
  <script src="./pages/reportes.js"></script>
  <script src="./pages/usuarios.js"></script>
  <script src="./pages/auditoria.js"></script>
  <script src="./pages/facturacion.js"></script>
  <script src="./js/00-mount-pages.js"></script>
  <script src="./js/01-config-state.js"></script>
  <script src="./js/02-catalogs-search.js"></script>
  <script src="./js/03-ui-navigation.js"></script>
  <script src="./js/04-admin-records.js"></script>
  <script src="./js/05-audit-billing.js"></script>
  <script src="./js/06-clinical.js"></script>
  <script src="./js/07-expediente-reportes.js"></script>
  <script src="./js/08-boot.js"></script>
</body>
</html>
